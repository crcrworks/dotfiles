[env]
_.file = [
  { path = "~/.config/mise/.env", redact = true },
  { path = "~/.config/mise/.env.local", redact = true },
]
_.path = [
  "~/.cargo/bin",
  "~/.cabal/bin",
  "./node_modules/.bin",
  "/home/asumo/.cargo/bin",
  "/opt/homebrew/bin",
  "/Users/{{env.USER}}/.local/bin",
  "/Users/{{env.USER}}/.ghcup/bin",
  "/Library/Frameworks/Python.framework/Versions/3.12/bin",
  "/Users/{{env.USER}}/Library/pnpm",
  "~/Library/Android/sdk/emulator",
  "~/Library/Android/sdk/tools",
  "~/Library/Android/sdk/tools-bin",
  "~/Library/Android/sdk/platforms-bin",
  "~/.bun/bin",
  "~/.local/share/chezmoi/ignore_bin",
]
autols_cmd = "eza"
DISPLAY = ":0"
# NODE_OPTIONS = "--openssl-legacy-provider"
# STARSHIP_CONFIG = "~/.config/starship/starship.toml"
PNPM_HOME = "/Users/{{env.USER}}/Library/pnpm"
EDITOR = "nvim"
NVIM_APPNAME = "nvim"
ANDROID_HOME = "~/Library/Android/sdk"
TSGOPATH = "/Users/{{env.USER}}/development/lsp/typescript-go/built/local/tsgo"
TERM = "xterm-256color"
OPENCODE_EXPERIMENTAL = "true"
OPENCODE_EXPERIMENTAL_PLAN_MODE = "true"
OPENCODE_EXPERIMENTAL_LSP_TOOL = "true"
PLAYWRIGHT_MCP_HEADLESS = "true"

LLM_PROVIDER = "openai"
LLM_MODEL = "gpt-5.5"
LLM_MAX_TOKENS = 2048
